services:
  qgis:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - QGIS_VERSION=${QGIS_VERSION:-3.44}
        - BASE_IMAGE=${BASE_IMAGE:-debian:bookworm-slim}
        - QGIS_REPO_TYPE=${QGIS_REPO_TYPE:-qgis-org}
        - QGIS_SUITE=${QGIS_SUITE:-bookworm}
        - QGIS_QT=${QGIS_QT:-5}
        - USER_ID=${UID:-1000}
        - GROUP_ID=${GID:-1000}

    # One shared image per QGIS version -- built once, used by all users.
    # The image tag does NOT include the username: every user on this host
    # runs the same image.  Only the container name, ports, and volumes differ.
    image: toms-qgis:${QGIS_VERSION:-3.44}

    # Container name is unique per (user, QGIS version).
    # Example: toms-qgis-3.44-alice
    container_name: toms-qgis-${QGIS_VERSION:-3.44}-${TOMS_USER:-user}

    environment:
      - DISPLAY=${DISPLAY:-:99}
      - QT_X11_NO_MITSHM=1
      - LIBGL_ALWAYS_INDIRECT=1
      - LIBGL_ALWAYS_SOFTWARE=1
      - QT_QUICK_BACKEND=software
      - QT_XCB_GL_INTEGRATION=none
      - QTWEBENGINE_DISABLE_SANDBOX=1
      - PGSERVICEFILE=/home/qgisuser/.pg_service.conf
      - QGIS_CUSTOM_CONFIG_PATH=/home/qgisuser/qgis_data
      - TOMs_FORM_PATH=/home/qgisuser/qgis_data/profiles/default/python/plugins/TOMs/ui
      - QGIS_LOGFILE_PATH=/home/qgisuser/log_files
      # QGIS_AUTH_DB_DIR_PATH is set by start.sh at runtime -- do NOT set here.
      # Setting it here causes Docker to pre-create the dir as root.
      - USE_VNC=${USE_VNC:-1}
      - QGIS_PLUGINPATH=/home/qgisuser/plugins
      # Pass actual UID/GID so start.sh uses the real user, not bash built-in
      - QGIS_RUN_UID=${UID:-1000}
      - QGIS_RUN_GID=${GID:-1000}

    ports:
      # noVNC browser UI  -- host port = 6080 + PORT_BASE
      # VNC direct client -- host port = 5900 + PORT_BASE
      #
      # PORT_BASE=0   -> 6080 / 5900   (default / alice)
      # PORT_BASE=100 -> 6180 / 6000   (bob)
      # PORT_BASE=200 -> 6280 / 6100   (carol)
      # PORT_BASE=300 -> 6380 / 6200   (dave)
      #
      # Docker Compose does not support arithmetic in port expressions, so
      # PORT_BASE must be a *complete port number*, not an offset.
      # Set noVNC_PORT and VNC_PORT explicitly in .env, derived from PORT_BASE:
      #   alice:  noVNC_PORT=6080  VNC_PORT=5900
      #   bob:    noVNC_PORT=6180  VNC_PORT=6000
      #   carol:  noVNC_PORT=6280  VNC_PORT=6100
      - "${noVNC_PORT:-6080}:6080"
      - "${VNC_PORT:-5900}:5900"

    volumes:
      # ── Shared, read-only resources (same for all users) ───────────────────
      # Plugins are shared across all users from a single host location.
      # All users contribute to and draw from the same plugin pool.
      - ../../plugins/:/home/qgisuser/plugins

      # Shared QGIS project files
      - /home/QGIS/tenants/qgs-resources:/home/qgisuser/projects

      # Shared PostGIS service file (read-only)
      - ../../../pg_env/pg_service.conf:/home/qgisuser/.pg_service.conf:ro

      # Shared coordinate transform grids (read-only)
      - ../../../qgis_proj/OSTN02_NTv2.gsb:/usr/share/proj/OSTN02_NTv2.gsb:ro
      - ../../../qgis_proj/uk_os_OSTN15_NTv2_OSGBtoETRS.tif:/usr/share/proj/uk_os_OSTN15_NTv2_OSGBtoETRS.tif:ro

      # ── Per-user runtime state (isolated per TOMS_USER) ────────────────────
      # Each user gets their own subtree under TOMS_HOST_BASE (default /home/<user>).
      # Docker Compose creates these host paths automatically if they don't exist.
      #
      # QGIS profile config (settings, symbology, etc.)
      - ${TOMS_HOST_BASE:-/home/${TOMS_USER:-user}}/toms-qgis/qgis_config/profiles/${QGIS_PROFILE:-qgis_3_44}/profiles/default/QGIS:/home/qgisuser/qgis_data/profiles/default/QGIS

      # Per-user log files -- never shared
      - ${TOMS_HOST_BASE:-/home/${TOMS_USER:-user}}/toms-qgis/log_files:/home/qgisuser/log_files

      # X11 socket -- required when USE_VNC=0 (host display passthrough)
      - /tmp/.X11-unix:/tmp/.X11-unix

    restart: "no"

networks:
  default:
    name: toms_net
    external: true