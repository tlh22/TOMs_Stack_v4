# For QGIS on Windows: copy needed [sections] to %AppData%\postgresql\pg_service.conf
# with host=127.0.0.1 and port=5439 (see docker-compose qwc-postgis ports).
# This file is for Docker services only (host=qwc-postgis, port=5432).

[qwc_configdb]
host=qwc-postgis
port=5432
dbname=qwc_services
user=qwc_admin
password=qwc_admin
sslmode=disable

[qwc_geodb]
host=qwc-postgis
port=5432
dbname=qwc_services
user=qwc_service
password=qwc_service
sslmode=disable
#
[TOMs_Test]
host=toms_postgis
port=5432
dbname=TOMs_Test
user=postgres
password=postgis
sslmode=disable
#
[threerivers]
host=toms_postgis
port=5432
dbname=threerivers
user=postgres
password=postgis
sslmode=disable